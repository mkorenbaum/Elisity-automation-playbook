name: Cleanup demo state

# Manually-triggered teardown of every demo CCC object. Run this from
# the Actions tab between demos to leave the tenant clean. Mirrors the
# style of bootstrap.yml.
#
# Deletes (in dependency order):
#   1. All non-reflection Policies inside FRSTR-HOSPITAL policy set
#   2. The FRSTR-HOSPITAL policy set itself (after PUT-clear of scope)
#   3. Every Policy Group carrying the FORRESTER-DEMO label
#   4. Every Security Profile whose name starts with FRSTR-
#   5. The FORRESTER-DEMO PG label
#
# Tenant content WITHOUT the FORRESTER-DEMO label, the FRSTR- name
# prefix, and outside the FRSTR-HOSPITAL policy set is never touched.
# CORK PGs / Default policy set / built-in SPs survive.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type CLEANUP-FORRESTER-DEMO to confirm full teardown'
        required: true

permissions:
  contents: read

concurrency:
  group: ccc-apply       # serialize against apply / promote / bootstrap
  cancel-in-progress: false

jobs:
  cleanup:
    if: github.event.inputs.confirm == 'CLEANUP-FORRESTER-DEMO'
    runs-on: self-hosted
    timeout-minutes: 10
    environment: insights-demo
    steps:
      - uses: actions/checkout@v4

      - name: Ensure PyYAML is installed
        run: |
          # PyYAML is required by the bin/*.py tooling. Prefer the system
          # package; fall back to an isolated venv. Fail LOUDLY if neither
          # yields a working import. The old `2>/dev/null || true` silently
          # produced a pip-less venv -> confusing exit 1 (resurrected 2026-06-23).
          if python3 -c 'import yaml' 2>/dev/null; then
            echo "PyYAML present in system python3 ($(python3 -c 'import yaml; print(yaml.__version__)'))"
          else
            echo "System PyYAML missing -- building isolated venv"
            python3 -m venv /tmp/forrester-venv
            /tmp/forrester-venv/bin/pip install --quiet --upgrade PyYAML
            echo "/tmp/forrester-venv/bin" >> "$GITHUB_PATH"
            /tmp/forrester-venv/bin/python -c 'import yaml; print("PyYAML", yaml.__version__, "(venv)")'
          fi

      - name: Render creds + run cleanup
        env:
          CCC_URL: ${{ secrets.CCC_URL }}
          CCC_CLIENT_ID: ${{ secrets.CCC_CLIENT_ID }}
          CCC_CLIENT_SECRET: ${{ secrets.CCC_CLIENT_SECRET }}
        run: |
          make ci-creds
          python3 bin/cleanup_demo.py | tee /tmp/cleanup.md

      - name: Append cleanup summary to job
        if: always()
        run: |
          if [ -f /tmp/cleanup.md ]; then
            cat /tmp/cleanup.md >> "$GITHUB_STEP_SUMMARY"
          fi
