name: Promote to enforcement

# Runs on every published release. Flips every policy declared in
# policies.yaml from MONITOR_ONLY to MONITOR_AND_ENFORCE.
#
# This is the "tag = production" GitOps moment for the analyst demo:
# `vX.Y.Z` becomes the audit trail of what was promoted to enforcement
# and when.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Manual promotion reason (audit trail)'
        required: false
        default: 'Manual promotion via workflow_dispatch'

permissions:
  contents: write          # need write to append promotion summary to release body

concurrency:
  group: ccc-apply       # serialize against apply.yml — never both at once
  cancel-in-progress: false

defaults:
  run:
    # self-hosted runner default shell is `bash -e` WITHOUT pipefail,
    # so `cmd | tee log` silently masked make/python failures (apply
    # reported success while `make demo` exited 2). pipefail fixes that.
    shell: bash -eo pipefail {0}

jobs:
  promote:
    # Self-hosted: see apply.yml for rationale (insights-demo not reachable
    # from GitHub-hosted runners).
    runs-on: self-hosted
    timeout-minutes: 5
    environment: insights-demo
    steps:
      - uses: actions/checkout@v4

      - name: Ensure PyYAML is installed
        run: |
          # PyYAML is required by the bin/*.py tooling. Prefer the system
          # package; fall back to an isolated venv. Fail LOUDLY if neither
          # yields a working import. The old `2>/dev/null || true` silently
          # produced a pip-less venv -> confusing exit 1 (resurrected 2026-06-23).
          if python3 -c 'import yaml' 2>/dev/null; then
            echo "PyYAML present in system python3 ($(python3 -c 'import yaml; print(yaml.__version__)'))"
          else
            echo "System PyYAML missing -- building isolated venv"
            python3 -m venv /tmp/forrester-venv
            /tmp/forrester-venv/bin/pip install --quiet --upgrade PyYAML
            echo "/tmp/forrester-venv/bin" >> "$GITHUB_PATH"
            /tmp/forrester-venv/bin/python -c 'import yaml; print("PyYAML", yaml.__version__, "(venv)")'
          fi

      - name: Promote MONITOR_ONLY → MONITOR_AND_ENFORCE
        env:
          CCC_URL: ${{ secrets.CCC_URL }}
          CCC_CLIENT_ID: ${{ secrets.CCC_CLIENT_ID }}
          CCC_CLIENT_SECRET: ${{ secrets.CCC_CLIENT_SECRET }}
        run: |
          make ci-creds
          python3 bin/promote.py | tee /tmp/promote.md

      - name: Comment on the release
        if: github.event_name == 'release'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/promote.md', 'utf8');
            await github.rest.repos.createReleaseAsset || null;
            // Append the promotion summary to the release body
            const release = context.payload.release;
            const newBody = `${release.body || ''}\n\n---\n${body}`;
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              body: newBody,
            });
