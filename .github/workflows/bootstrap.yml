name: Bootstrap Forrester Demo

# Manually-triggered first-run setup. Creates the policy set, PG label,
# and security profiles idempotently. After CCC objects exist, this
# workflow opens an auto-PR that caches the resolved IDs into
# inventory/group_vars/all.yml so subsequent CI runs don't have to
# look them up.
#
# The full pure-UI bootstrap loop:
#   Run bootstrap workflow → creates objects in CCC → opens cache PR →
#   reviewer merges → main has the IDs → demo is live.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type BOOTSTRAP-FORRESTER-DEMO to confirm'
        required: true
      target_branch:
        description: 'Branch to bootstrap from + open the cache PR against'
        required: false
        default: 'main'

permissions:
  contents: write          # push the cache branch
  pull-requests: write     # open the cache PR

concurrency:
  group: ccc-apply       # serialize against apply / promote / cleanup
  cancel-in-progress: false

jobs:
  bootstrap:
    if: github.event.inputs.confirm == 'BOOTSTRAP-FORRESTER-DEMO'
    runs-on: self-hosted
    timeout-minutes: 10
    environment: insights-demo
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 0

      - name: Ensure PyYAML is installed
        run: |
          # PyYAML is required by the bin/*.py tooling. Prefer the system
          # package; fall back to an isolated venv. Fail LOUDLY if neither
          # yields a working import. The old `2>/dev/null || true` silently
          # produced a pip-less venv -> confusing exit 1 (resurrected 2026-06-23).
          if python3 -c 'import yaml' 2>/dev/null; then
            echo "PyYAML present in system python3 ($(python3 -c 'import yaml; print(yaml.__version__)'))"
          else
            echo "System PyYAML missing -- building isolated venv"
            python3 -m venv /tmp/forrester-venv
            /tmp/forrester-venv/bin/pip install --quiet --upgrade PyYAML
            echo "/tmp/forrester-venv/bin" >> "$GITHUB_PATH"
            /tmp/forrester-venv/bin/python -c 'import yaml; print("PyYAML", yaml.__version__, "(venv)")'
          fi

      - name: Render creds + run bootstrap
        env:
          CCC_URL: ${{ secrets.CCC_URL }}
          CCC_CLIENT_ID: ${{ secrets.CCC_CLIENT_ID }}
          CCC_CLIENT_SECRET: ${{ secrets.CCC_CLIENT_SECRET }}
        run: |
          make ci-creds
          python3 bin/bootstrap.py 2>&1 | tee /tmp/bootstrap.md

      - name: Append bootstrap summary to job
        if: always()
        run: |
          if [ -f /tmp/bootstrap.md ]; then
            cat /tmp/bootstrap.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Inject resolved IDs into inventory/group_vars/all.yml
        id: inject
        run: |
          if [ ! -f /tmp/bootstrap-ids.json ]; then
            echo "ERROR: /tmp/bootstrap-ids.json not produced — bootstrap.py failed?"
            exit 1
          fi
          python3 - <<'PY' > /tmp/inject-summary.txt
          import json, pathlib, re

          ids = json.loads(pathlib.Path("/tmp/bootstrap-ids.json").read_text())
          ps_id    = ids["ccc_policy_set_id"]
          ps_name  = ids["ccc_policy_set_name"]
          lbl_id   = ids["ccc_pg_label_id"]
          lbl_name = ids["ccc_pg_label_name"]

          path = pathlib.Path("inventory/group_vars/all.yml")
          text = path.read_text()

          # Replace the empty-string placeholders with real IDs while
          # preserving comments + formatting. These keys are guaranteed
          # to exist in the v2 all.yml.
          before = text
          text = re.sub(
              r'(ccc_policy_set_id:\s+)"[^"]*"',
              rf'\g<1>"{ps_id}"', text, count=1)
          text = re.sub(
              r'(ccc_policy_set_name:\s+)"[^"]*"',
              rf'\g<1>"{ps_name}"', text, count=1)
          text = re.sub(
              r'(ccc_pg_label_id:\s+)"[^"]*"',
              rf'\g<1>"{lbl_id}"', text, count=1)
          text = re.sub(
              r'(ccc_pg_label_name:\s+)"[^"]*"',
              rf'\g<1>"{lbl_name}"', text, count=1)

          path.write_text(text)

          changed = before != text
          print(f"changed={changed}")
          print(f"ps_id={ps_id}")
          print(f"ps_name={ps_name}")
          print(f"lbl_id={lbl_id}")
          print(f"lbl_name={lbl_name}")
          PY
          cat /tmp/inject-summary.txt
          # Surface key facts as step outputs for downstream steps
          {
            grep '^changed=' /tmp/inject-summary.txt
            grep '^ps_id=' /tmp/inject-summary.txt
          } >> "$GITHUB_OUTPUT"

      - name: Configure git identity
        if: steps.inject.outputs.changed == 'True'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit + push cache branch
        id: branch
        if: steps.inject.outputs.changed == 'True'
        run: |
          BRANCH="bootstrap-cache-$(date +%Y%m%d-%H%M%S)"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          git checkout -b "$BRANCH"
          git add inventory/group_vars/all.yml
          git commit -m "bootstrap: cache resolved IDs from forrester-demo-hospital-monitor-only

          This commit was generated by .github/workflows/bootstrap.yml.

          Caches the CCC IDs resolved by bin/bootstrap.py so that
          subsequent CI runs (apply.yml, drift-check.yml, reconcile)
          do not have to look them up by name. Safe to merge once
          reviewed."
          git push origin "$BRANCH"

      - name: Open cache PR
        if: steps.inject.outputs.changed == 'True'
        uses: actions/github-script@v7
        env:
          BRANCH: ${{ steps.branch.outputs.branch }}
          BASE: ${{ inputs.target_branch }}
          PS_ID: ${{ steps.inject.outputs.ps_id }}
        with:
          script: |
            const branch = process.env.BRANCH;
            const base = process.env.BASE;
            const psId = process.env.PS_ID;

            const body = [
              `### Bootstrap cache — resolved CCC IDs`,
              ``,
              `This PR was generated automatically by the bootstrap workflow.`,
              `It caches the IDs CCC returned for the objects bootstrap created`,
              `(or confirmed already existed):`,
              ``,
              `- **Policy Set ID:** \`${psId}\``,
              ``,
              `Once merged, \`apply.yml\` / \`drift-check.yml\` / \`reconcile.py\` use`,
              `these IDs directly instead of looking them up by name on every run.`,
              ``,
              `Bootstrap is idempotent — safe to re-run if you need to re-cache.`,
              ``,
              `_Generated by the bootstrap workflow._`,
            ].join('\n');

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `bootstrap: cache resolved IDs from forrester-demo-hospital-monitor-only`,
              head: branch,
              base,
              body,
            });

            console.log(`Opened PR #${pr.number}: ${pr.html_url}`);

            const summary = [
              `## 📤 Bootstrap cache PR opened`,
              ``,
              `- **PR:** [#${pr.number} ${pr.title}](${pr.html_url})`,
              `- **Branch:** \`${branch}\``,
              `- **Target:** \`${base}\``,
              ``,
              `Review the diff (it should only touch \`inventory/group_vars/all.yml\`),`,
              `then merge to make the cached IDs live.`,
            ].join('\n');
            require('fs').appendFileSync(process.env.GITHUB_STEP_SUMMARY, summary);

      - name: Note already-cached
        if: steps.inject.outputs.changed != 'True'
        run: |
          echo "## ✅ Bootstrap re-run — IDs already cached" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "\`inventory/group_vars/all.yml\` already contains the resolved IDs." >> "$GITHUB_STEP_SUMMARY"
          echo "No PR needed. Bootstrap is idempotent." >> "$GITHUB_STEP_SUMMARY"
