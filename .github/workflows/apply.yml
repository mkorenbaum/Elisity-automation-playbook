name: Apply to CCC

# Runs on every push to main that touches policy YAML. Applies the
# declared state to the live CCC tenant in MONITOR_ONLY (simulation)
# mode. New policies do NOT enforce until a release tag is published
# (see promote.yml).
#
# The "merge IS the deployment" moment for the analyst demo.

on:
  push:
    branches: [main]
    paths:
      - 'policy-groups.yaml'
      - 'policies.yaml'
      - 'inventory/group_vars/all.yml'
      - 'playbooks/**'
      - 'bin/**'
      - '.github/workflows/apply.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ccc-apply
  cancel-in-progress: false

jobs:
  apply:
    # Self-hosted: insights-demo lives on Elisity's internal network and
    # is unreachable from GitHub's public-IP runners. The runner installed
    # on Mike's lab host (10.0.0.175) routes to the tenant directly.
    runs-on: self-hosted
    timeout-minutes: 10
    environment: insights-demo   # protects the secret + provides the audit trail
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2   # enough to resolve the merge commit's PR

      - name: Ensure ansible + PyYAML are installed
        run: |
          python3 -m venv /tmp/forrester-venv 2>/dev/null || true
          /tmp/forrester-venv/bin/pip install --quiet --upgrade ansible PyYAML
          echo "/tmp/forrester-venv/bin" >> "$GITHUB_PATH"

      - name: Apply YAML to CCC
        env:
          CCC_URL: ${{ secrets.CCC_URL }}
          CCC_CLIENT_ID: ${{ secrets.CCC_CLIENT_ID }}
          CCC_CLIENT_SECRET: ${{ secrets.CCC_CLIENT_SECRET }}
        run: |
          make ci-creds
          make ci-apply 2>&1 | tee /tmp/apply.log

      - name: Reconcile — delete CCC orphans no longer declared in YAML
        # This step makes apply two-way: removing a YAML entry now
        # actually deletes the corresponding object from CCC. Scoped
        # to the forrester-demo- prefix — production policies are
        # never at risk.
        run: |
          python3 bin/reconcile.py "forrester-demo-" 2>&1 | tee /tmp/reconcile.md

      - name: Build apply summary
        if: always()
        run: |
          {
            echo "## 🚀 Applied to Elisity (\`MONITOR_ONLY\`)"
            echo
            echo "Source-of-truth this run:  \`${{ github.sha }}\`"
            echo "Tenant: \`${{ secrets.CCC_URL }}\`"
            echo
            echo "<details><summary>Apply log (last 80 lines)</summary>"
            echo
            echo '```'
            tail -80 /tmp/apply.log || true
            echo '```'
            echo
            echo "</details>"
            echo
            if [ -s /tmp/reconcile.md ]; then
              cat /tmp/reconcile.md
              echo
            fi
            echo "**Next step in the GitOps pipeline:** cut a release tag "
            echo "(\`vX.Y.Z\`) to promote these policies to "
            echo "\`MONITOR_AND_ENFORCE\`."
          } > /tmp/apply-comment.md
          cat /tmp/apply-comment.md

      - name: Find related PR
        if: always()
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha;
            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha,
            });
            return prs.length > 0 ? prs[0].number : 0;
          result-encoding: string

      - name: Comment on PR (if push was a merge)
        if: always() && steps.pr.outputs.result != '0' && steps.pr.outputs.result != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          number: ${{ steps.pr.outputs.result }}
          header: elisity-apply
          path: /tmp/apply-comment.md
