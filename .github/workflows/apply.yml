name: Apply to CCC

# Runs on every push to main that touches policy YAML or tooling.
# Applies declared state to the live CCC tenant in MONITOR_ONLY.
#
# Dependency order: policy-set -> security-profiles -> policy-groups -> policies
# Each later step needs the earlier objects to exist.

on:
  push:
    branches: [main]
    paths:
      - 'policy-set.yaml'
      - 'security-profiles.yaml'
      - 'policy-groups.yaml'
      - 'policies.yaml'
      - 'inventory/group_vars/all.yml'
      - 'playbooks/**'
      - 'bin/**'
      - '.github/workflows/apply.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ccc-apply
  cancel-in-progress: false

defaults:
  run:
    # self-hosted runner default shell is `bash -e` WITHOUT pipefail,
    # so `cmd | tee log` silently masked make/python failures (apply
    # reported success while `make demo` exited 2). pipefail fixes that.
    shell: bash -eo pipefail {0}

jobs:
  apply:
    runs-on: self-hosted
    timeout-minutes: 10
    environment: insights-demo
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Ensure ansible + PyYAML are installed
        run: |
          # apply runs `ansible-playbook` (Makefile `demo`). ansible is NOT
          # installed system-wide on the self-hosted runner, so build an
          # isolated venv with ansible + PyYAML and put it on PATH for the
          # apply step. Fail LOUDLY on any install error (the old
          # `2>/dev/null || true` masked a pip-less venv -> exit 1).
          python3 -m venv /tmp/forrester-venv
          /tmp/forrester-venv/bin/pip install --quiet --upgrade ansible PyYAML
          echo "/tmp/forrester-venv/bin" >> "$GITHUB_PATH"
          /tmp/forrester-venv/bin/ansible-playbook --version | head -1
          /tmp/forrester-venv/bin/python -c 'import yaml; print("PyYAML", yaml.__version__)'

      - name: Apply YAML to CCC (dependency order)
        env:
          CCC_URL: ${{ secrets.CCC_URL }}
          CCC_CLIENT_ID: ${{ secrets.CCC_CLIENT_ID }}
          CCC_CLIENT_SECRET: ${{ secrets.CCC_CLIENT_SECRET }}
        run: |
          make ci-creds
          make ci-apply 2>&1 | tee /tmp/apply.log

      - name: Reconcile — delete CCC orphans no longer declared in YAML
        run: |
          python3 bin/reconcile.py 2>&1 | tee /tmp/reconcile.md

      - name: Build apply summary
        if: always()
        run: |
          {
            echo "## Applied to Elisity (\`MONITOR_ONLY\`)"
            echo
            echo "Source-of-truth this run:  \`${{ github.sha }}\`"
            echo "Tenant: \`${{ secrets.CCC_URL }}\`"
            echo
            echo "<details><summary>Apply log (last 80 lines)</summary>"
            echo
            echo '```'
            tail -80 /tmp/apply.log || true
            echo '```'
            echo
            echo "</details>"
            echo
            if [ -s /tmp/reconcile.md ]; then
              cat /tmp/reconcile.md
              echo
            fi
            echo "**Next step in the GitOps pipeline:** cut a release tag "
            echo "(\`vX.Y.Z\`) to promote these policies to "
            echo "\`MONITOR_AND_ENFORCE\`."
          } > /tmp/apply-comment.md
          cat /tmp/apply-comment.md

      - name: Find related PR
        if: always()
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha;
            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha,
            });
            return prs.length > 0 ? prs[0].number : 0;
          result-encoding: string

      - name: Comment on PR (if push was a merge)
        if: always() && steps.pr.outputs.result != '0' && steps.pr.outputs.result != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          number: ${{ steps.pr.outputs.result }}
          header: elisity-apply
          path: /tmp/apply-comment.md
