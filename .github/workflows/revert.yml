name: Revert (remove a Policy Group)

# Manually-triggered workflow that opens a "Revert: remove <pg_name>" PR
# against main. The PR removes the named Policy Group from
# policy-groups.yaml AND any Policy that references it from
# policies.yaml. Once merged, apply.yml's reconcile step deletes the
# objects from CCC.
#
# The full pure-UI loop:
#   Run revert workflow → PR opens → preview.yml comments diff →
#   reviewer merges → apply.yml runs → reconcile deletes from CCC →
#   drift-check stays clean.

on:
  workflow_dispatch:
    inputs:
      pg_name:
        description: 'Name of the Policy Group to remove (e.g. forrester-demo-pacs)'
        required: true
        default: 'forrester-demo-pacs'
      reason:
        description: 'Why are we removing this PG? (becomes part of the PR body)'
        required: false
        default: 'Demo cleanup'

permissions:
  contents: write           # push the revert branch
  pull-requests: write      # open the PR

jobs:
  open-revert-pr:
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Ensure PyYAML is installed
        run: |
          # PyYAML is required by the bin/*.py tooling. Prefer the system
          # package; fall back to an isolated venv. Fail LOUDLY if neither
          # yields a working import. The old `2>/dev/null || true` silently
          # produced a pip-less venv -> confusing exit 1 (resurrected 2026-06-23).
          if python3 -c 'import yaml' 2>/dev/null; then
            echo "PyYAML present in system python3 ($(python3 -c 'import yaml; print(yaml.__version__)'))"
          else
            echo "System PyYAML missing -- building isolated venv"
            python3 -m venv /tmp/forrester-venv
            /tmp/forrester-venv/bin/pip install --quiet --upgrade PyYAML
            echo "/tmp/forrester-venv/bin" >> "$GITHUB_PATH"
            /tmp/forrester-venv/bin/python -c 'import yaml; print("PyYAML", yaml.__version__, "(venv)")'
          fi

      - name: Strip the PG (and any referencing Policy) from YAML
        id: strip
        env:
          PG_NAME: ${{ inputs.pg_name }}
        run: |
          python3 - <<'PY' > /tmp/strip-summary.txt
          import os, sys, yaml, pathlib
          name = os.environ["PG_NAME"]

          pg_path = pathlib.Path("policy-groups.yaml")
          pol_path = pathlib.Path("policies.yaml")
          pg_doc = yaml.safe_load(pg_path.read_text()) or {}
          pol_doc = yaml.safe_load(pol_path.read_text()) or {}

          before_pgs = pg_doc.get("policy_groups", [])
          before_pols = pol_doc.get("policies", [])

          remaining_pgs = [p for p in before_pgs if p["name"] != name]
          # Drop any policy that names this PG as its source
          remaining_pols = [p for p in before_pols if p.get("source_policy_group") != name]

          removed_pgs = [p["name"] for p in before_pgs if p["name"] == name]
          removed_pols = [p["name"] for p in before_pols if p.get("source_policy_group") == name]

          if not removed_pgs:
              sys.stderr.write(f"ERROR: Policy Group '{name}' not found in policy-groups.yaml.\n")
              sys.stderr.write(f"Existing PGs: {[p['name'] for p in before_pgs]}\n")
              sys.exit(2)

          pg_doc["policy_groups"] = remaining_pgs
          pol_doc["policies"] = remaining_pols
          pg_path.write_text(yaml.dump(pg_doc, sort_keys=False))
          pol_path.write_text(yaml.dump(pol_doc, sort_keys=False))

          print(f"removed_pgs={removed_pgs}")
          print(f"removed_pols={removed_pols}")
          PY
          cat /tmp/strip-summary.txt

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit + push revert branch
        id: branch
        env:
          PG_NAME: ${{ inputs.pg_name }}
          REASON: ${{ inputs.reason }}
        run: |
          SAFE=$(echo "$PG_NAME" | tr -c 'a-zA-Z0-9' '-')
          BRANCH="revert-${SAFE}-$(date +%Y%m%d-%H%M%S)"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          git checkout -b "$BRANCH"
          git add policy-groups.yaml policies.yaml
          git commit -m "Revert: remove ${PG_NAME}

          Reason: ${REASON}

          This PR was generated by the revert workflow. On merge,
          apply.yml will reconcile CCC and delete the orphaned objects.
          "
          git push origin "$BRANCH"

      - name: Open PR
        uses: actions/github-script@v7
        env:
          PG_NAME: ${{ inputs.pg_name }}
          REASON: ${{ inputs.reason }}
          BRANCH: ${{ steps.branch.outputs.branch }}
        with:
          script: |
            const fs = require('fs');
            const pgName = process.env.PG_NAME;
            const reason = process.env.REASON;
            const branch = process.env.BRANCH;

            const body = [
              `### Revert: remove \`${pgName}\``,
              ``,
              `**Reason:** ${reason}`,
              ``,
              `This PR removes the \`${pgName}\` Policy Group (and any Policy referencing it as a source) from \`policy-groups.yaml\` / \`policies.yaml\`.`,
              ``,
              `**On merge, the following will happen automatically:**`,
              `1. \`apply.yml\` runs against \`main\``,
              `2. Reconcile step detects the YAML→CCC delta and deletes the matching objects from \`insights-demo\``,
              `3. Drift check confirms the tenant is in sync`,
              ``,
              `**Pure-UI loop:** open this PR → preview comment lands → merge → CCC reflects the change. No \`git\` on a laptop.`,
              ``,
              `_Generated by the revert workflow._`,
            ].join('\n');

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Revert: remove ${pgName}`,
              head: branch,
              base: 'main',
              body,
            });

            console.log(`Opened PR #${pr.number}: ${pr.html_url}`);

            // Write a job summary so the workflow run page shows the PR link
            const summary = [
              `## 📤 Revert PR opened`,
              ``,
              `- **PR:** [#${pr.number} ${pr.title}](${pr.html_url})`,
              `- **Branch:** \`${branch}\``,
              `- **PG removed:** \`${pgName}\``,
              ``,
              `Next: review the PR (preview comment will land in a few seconds), then merge.`,
            ].join('\n');
            require('fs').appendFileSync(process.env.GITHUB_STEP_SUMMARY, summary);
