name: Drift Check

# Hourly reconciliation: compare CCC live state against this repo's main
# branch across all 4 object types (policy set, security profiles, policy
# groups, policies). Opens or updates a GitHub issue on drift.

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

concurrency:
  group: ccc-drift
  cancel-in-progress: true

jobs:
  drift:
    runs-on: self-hosted
    timeout-minutes: 5
    environment: insights-demo
    steps:
      - uses: actions/checkout@v4

      - name: Ensure PyYAML is installed
        run: |
          # PyYAML is required by the bin/*.py tooling. Prefer the system
          # package; fall back to an isolated venv. Fail LOUDLY if neither
          # yields a working import. The old `2>/dev/null || true` silently
          # produced a pip-less venv -> confusing exit 1 (resurrected 2026-06-23).
          if python3 -c 'import yaml' 2>/dev/null; then
            echo "PyYAML present in system python3 ($(python3 -c 'import yaml; print(yaml.__version__)'))"
          else
            echo "System PyYAML missing -- building isolated venv"
            python3 -m venv /tmp/forrester-venv
            /tmp/forrester-venv/bin/pip install --quiet --upgrade PyYAML
            echo "/tmp/forrester-venv/bin" >> "$GITHUB_PATH"
            /tmp/forrester-venv/bin/python -c 'import yaml; print("PyYAML", yaml.__version__, "(venv)")'
          fi

      - name: Run drift check
        id: drift
        env:
          CCC_URL: ${{ secrets.CCC_URL }}
          CCC_CLIENT_ID: ${{ secrets.CCC_CLIENT_ID }}
          CCC_CLIENT_SECRET: ${{ secrets.CCC_CLIENT_SECRET }}
        run: |
          make ci-creds
          set +e
          python3 bin/drift.py > /tmp/drift.md 2> /tmp/drift.err
          rc=$?
          set -e
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          cat /tmp/drift.md
          # rc: 0 = in sync, 1 = real drift (-> manage issue), >=2 = CCC/auth/
          # network error. Treat >=2 as a HARD job failure -- NOT drift -- so a
          # broken tenant connection never masquerades as drift (false issue #53,
          # the invalid_client 401 misreported as drift since 2026-05-15).
          if [ "$rc" -ge 2 ]; then
            echo "::error::drift.py could not evaluate drift (rc=$rc): CCC unreachable / auth failure, not drift."
            cat /tmp/drift.err
            exit "$rc"
          fi

      - name: Manage drift issue
        uses: actions/github-script@v7
        env:
          DRIFT_RC: ${{ steps.drift.outputs.rc }}
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/drift.md', 'utf8');
            const drifted = process.env.DRIFT_RC !== '0';
            const title = 'CCC drift detected';

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'drift',
              per_page: 100,
            });
            const existing = issues.find(i => i.title === title);

            if (drifted) {
              if (existing) {
                await github.rest.issues.update({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: existing.number, body,
                });
                console.log(`Updated drift issue #${existing.number}`);
              } else {
                const { data: created } = await github.rest.issues.create({
                  owner: context.repo.owner, repo: context.repo.repo,
                  title, body, labels: ['drift'],
                });
                console.log(`Opened drift issue #${created.number}`);
              }
            } else if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.number,
                body: 'Drift cleared -- repo and CCC are back in sync. Closing.',
              });
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.number, state: 'closed',
              });
              console.log(`Closed drift issue #${existing.number}`);
            } else {
              console.log('No drift, no existing issue. Nothing to do.');
            }
