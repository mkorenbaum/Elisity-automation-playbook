---
# Git-tracked Policy Set + PG Label definition.
#
# Naming convention:
#   - Policy Set name carries the FRSTR- prefix (no PG-label mechanism
#     for policy sets, so the prefix is the only safety boundary).
#   - PG names are FRSTR- prefixed (e.g. FRSTR-INFUSION-PUMPS) AND carry
#     the `FORRESTER-DEMO` label. The label is the cleanup tag; the
#     prefix prevents name collisions with the tenant's own baseline
#     PGs (insights-demo ships healthcare PGs named `Patient Monitors`,
#     `Imaging`, etc. and CCC enforces case-insensitive PG-name uniqueness).
#   - Site label `Hospital` is the existing site on insights-demo.
#
# Bootstrap creates these idempotently from a workflow_dispatch action
# in .github/workflows/bootstrap.yml. After creation it auto-PRs the
# resolved IDs into inventory/group_vars/all.yml.

policy_set:
  name: FRSTR-HOSPITAL
  description: |
    Forrester demo policy set, Hospital site, monitor-only by default.
    Promotion to MONITOR_AND_ENFORCE happens via release tag.
  state: MONITOR_ONLY
  policy_group_labels:
    - FORRESTER-DEMO
  site_labels:
    - Hospital              # existing site on insights-demo

# PG label that scopes which Policy Groups participate in this demo.
# This is the invisible cleanup tag: a PG carries the FORRESTER-DEMO
# label; its name is FRSTR- prefixed (e.g. FRSTR-INFUSION-PUMPS) to avoid
# collisions with the tenant's baseline healthcare PGs.
policy_group_labels:
  - name: FORRESTER-DEMO
    description: |
      Marker label for Policy Groups owned by the Forrester GitOps
      demo. Used both as the policy-set scoping boundary and as the
      reconcile.py safety tag. Any PG without this label is never
      considered for deletion.
