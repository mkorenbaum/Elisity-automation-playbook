---
# Apply policy-groups.yaml to CCC. Idempotent: looks up by name, creates
# if missing.

- ansible.builtin.import_playbook: _auth.yml

- name: "[01] Apply Policy Groups from policy-groups.yaml"
  hosts: local
  gather_facts: false
  vars_files:
    - ../creds.yml
    - ../policy-groups.yaml
  tasks:
    - name: Read cached token
      ansible.builtin.slurp:
        src: /tmp/.ccc_token
      register: token_blob
      no_log: true

    - name: Set token fact
      ansible.builtin.set_fact:
        ccc_token: "{{ token_blob.content | b64decode }}"
      no_log: true

    - name: List existing Policy Groups
      ansible.builtin.command:
        argv:
          - python3
          - "{{ playbook_dir }}/../bin/ccc.py"
          - call
          - --token
          - "{{ ccc_token }}"
          - "{{ ccc_base }}/api/policy/v2/policy-groups?size=500"
      register: existing_pgs_resp
      changed_when: false

    - name: Parse existing PG list
      ansible.builtin.set_fact:
        existing_pg_content: "{{ (existing_pgs_resp.stdout | from_json).content }}"

    - name: Build name→id map of existing PGs
      ansible.builtin.set_fact:
        existing_pg_map: >-
          {{ dict(existing_pg_content
                  | map(attribute='name')
                  | zip(existing_pg_content | map(attribute='id'))) }}

    - name: Stage PG create payloads to /tmp
      ansible.builtin.copy:
        content: "{{ pg_body | to_nice_json }}"
        dest: "/tmp/.pg-{{ item.name }}.json"
        mode: "0600"
      vars:
        pg_body:
          name: "{{ item.name }}"
          description: "{{ item.description | trim }}"
          policyGroupType: "{{ item.type }}"
          securityLevel: "{{ item.security_level }}"
          autoLockDevices: "{{ item.auto_lock_devices }}"
          labels:
            - "{{ ccc_default_label_id }}"
          matchingCriteria:
            conditionBlocks:
              - conditions:
                  - operator: "{{ item.match.operator }}"
                    attributeFqdn: "{{ item.match.attribute }}"
                    attributeType: STRING
                    value: "{{ item.match.match_values }}"
      loop: "{{ policy_groups }}"
      loop_control:
        label: "{{ item.name }}"
      when: item.name not in existing_pg_map

    - name: Create Policy Groups that do not exist yet
      ansible.builtin.command:
        argv:
          - python3
          - "{{ playbook_dir }}/../bin/ccc.py"
          - call
          - --method
          - POST
          - --token
          - "{{ ccc_token }}"
          - --body-file
          - "/tmp/.pg-{{ item.name }}.json"
          - "{{ ccc_base }}/api/policy/v2/policy-groups/dynamic"
      when: item.name not in existing_pg_map
      loop: "{{ policy_groups }}"
      loop_control:
        label: "{{ item.name }}"
      changed_when: true

    - name: Re-list Policy Groups to capture new IDs
      ansible.builtin.command:
        argv:
          - python3
          - "{{ playbook_dir }}/../bin/ccc.py"
          - call
          - --token
          - "{{ ccc_token }}"
          - "{{ ccc_base }}/api/policy/v2/policy-groups?size=500"
      register: refreshed_pgs_resp
      changed_when: false

    - name: Parse refreshed PG list
      ansible.builtin.set_fact:
        refreshed_pg_content: "{{ (refreshed_pgs_resp.stdout | from_json).content }}"

    - name: Build final name→id map for our managed PGs
      ansible.builtin.set_fact:
        pg_id_map: >-
          {{ dict(refreshed_pg_content
                  | selectattr('name','in', policy_groups | map(attribute='name') | list)
                  | map(attribute='name')
                  | zip(refreshed_pg_content
                        | selectattr('name','in', policy_groups | map(attribute='name') | list)
                        | map(attribute='id'))) }}

    - name: Persist Policy Group state to disk
      ansible.builtin.copy:
        content: "{{ {'policy_groups': pg_id_map} | to_nice_json }}"
        dest: "{{ state_file }}"
        mode: "0644"

    - name: Clean up staged payload files
      ansible.builtin.file:
        path: "/tmp/.pg-{{ item.name }}.json"
        state: absent
      loop: "{{ policy_groups }}"
      loop_control:
        label: "{{ item.name }}"

    - name: "Policy Groups in state"
      ansible.builtin.debug:
        msg: "  • {{ item.key }}  →  {{ item.value }}"
      loop: "{{ pg_id_map | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
