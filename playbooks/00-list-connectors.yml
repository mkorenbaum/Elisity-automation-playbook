---
# Read-only proof of life — pulls connector inventory from CCC over the
# REST API and prints it as a clean table. This is the "open API" demo.

- ansible.builtin.import_playbook: _auth.yml

- name: "[00] List connectors via CCC REST API"
  hosts: local
  gather_facts: false
  vars_files:
    - ../creds.yml
  tasks:
    - name: Read cached token
      ansible.builtin.slurp:
        src: /tmp/.ccc_token
      register: token_blob
      no_log: true

    - name: Set token fact
      ansible.builtin.set_fact:
        ccc_token: "{{ token_blob.content | b64decode }}"
      no_log: true

    - name: GET /api/identity-graph/v1/connector-connectivity
      ansible.builtin.command:
        argv:
          - python3
          - "{{ playbook_dir }}/../bin/ccc.py"
          - call
          - --token
          - "{{ ccc_token }}"
          - "{{ ccc_url }}/api/identity-graph/v1/connector-connectivity"
      register: connectors_resp
      changed_when: false

    - name: Parse connectors response
      ansible.builtin.set_fact:
        connectors_list: "{{ connectors_resp.stdout | from_json }}"

    - name: "Connector inventory ({{ connectors_list | length }} configured)"
      ansible.builtin.debug:
        msg: "  • {{ '%-32s' | format(item.type) }}  status={{ item.status | default('UNKNOWN') }}"
      loop: "{{ connectors_list }}"
      loop_control:
        label: "{{ item.type }}"
