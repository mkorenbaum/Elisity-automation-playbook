---
# Re-fetches everything we created and prints it. Useful for the analyst
# to see live state coming back from the API.

- ansible.builtin.import_playbook: _auth.yml

- name: "[03] Verify created objects"
  hosts: local
  gather_facts: false
  vars_files:
    - ../creds.yml
    - ../policy-groups.yaml
    - ../policies.yaml
  tasks:
    - name: Read cached token
      ansible.builtin.slurp:
        src: /tmp/.ccc_token
      register: token_blob
      no_log: true

    - name: Set token fact
      ansible.builtin.set_fact:
        ccc_token: "{{ token_blob.content | b64decode }}"
      no_log: true

    - name: Read state
      ansible.builtin.slurp:
        src: "{{ state_file }}"
      register: state_blob

    - name: Parse state
      ansible.builtin.set_fact:
        state: "{{ state_blob.content | b64decode | from_json }}"

    - name: Fetch each created Policy Group (curl GET)
      ansible.builtin.command:
        argv:
          - curl
          - --silent
          - --show-error
          - --fail
          - "{{ '--insecure' if not ccc_validate_certs else '--verbose' }}"
          - --header
          - "Authorization: Bearer {{ ccc_token }}"
          - --header
          - "Accept: application/json"
          - "{{ ccc_url }}/api/policy/v2/policy-groups/{{ state.policy_groups[item.name] }}"
      loop: "{{ policy_groups }}"
      loop_control:
        label: "{{ item.name }}"
      register: pg_fetch
      changed_when: false

    - name: "Policy Group state"
      ansible.builtin.debug:
        msg:
          - "Name:               {{ pg.name }}"
          - "ID:                 {{ pg.id }}"
          - "Type:               {{ pg.policyGroupType }}"
          - "Security Level:     {{ pg.securityLevel }}"
          - "Matched devices:    {{ pg.assetToPolicyGroupCount | default(0) }} (online: {{ pg.onlineAssetToPolicyGroupCount | default(0) }})"
          - "Status:             {{ pg.status }}"
      vars:
        pg: "{{ item.stdout | from_json }}"
      loop: "{{ pg_fetch.results }}"
      loop_control:
        label: "{{ (item.stdout | from_json).name }}"

    - name: Fetch all policies in target Policy Set (curl GET)
      ansible.builtin.command:
        argv:
          - curl
          - --silent
          - --show-error
          - --fail
          - "{{ '--insecure' if not ccc_validate_certs else '--verbose' }}"
          - --header
          - "Authorization: Bearer {{ ccc_token }}"
          - --header
          - "Accept: application/json"
          - "{{ ccc_url }}/api/policy/v1/policy-sets/{{ ccc_policy_set_id }}/policies?size=1000"
      register: all_policies_resp
      changed_when: false

    - name: Parse all policies content
      ansible.builtin.set_fact:
        all_policies_content: "{{ (all_policies_resp.stdout | from_json).content }}"

    - name: "Policy state"
      ansible.builtin.debug:
        msg:
          - "Name:        {{ row.name }}"
          - "ID:          {{ row.id }}"
          - "Source:      {{ row.srcPolicyGroupName }}"
          - "Dest:        {{ row.dstPolicyGroupName }}"
          - "SP:          {{ row.finalActionName }}"
          - "Type:        {{ row.policyTypeName | default('?') }}"
      vars:
        row: "{{ (all_policies_content | selectattr('name','equalto', item.name) | list | first) }}"
      loop: "{{ policies }}"
      loop_control:
        label: "{{ item.name }}"
      when: (all_policies_content | selectattr('name','equalto', item.name) | list | length) > 0
