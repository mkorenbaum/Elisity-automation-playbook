---
# Acquires an OAuth2 client_credentials token from CCC.
# Caches the bare token at /tmp/.ccc_token for downstream plays.
#
# Implementation: every CCC API interaction is delegated to bin/ccc.py,
# a 100-line Python 3 stdlib helper. The script reads the client_secret
# from stdin so it never appears in argv (no `-vv` argv leaks, no
# /proc/PID/cmdline exposure). Errors are surfaced via stderr and a
# /tmp/ccc-debug.log dump so failures are debuggable without rerunning.

- name: "[auth] OAuth client_credentials → access token"
  hosts: local
  gather_facts: false
  vars_files:
    - ../creds.yml
  tasks:
    - name: Verify python3 is available
      ansible.builtin.command: python3 --version
      register: py_check
      changed_when: false
      failed_when: py_check.rc != 0

    - name: Acquire access token via bin/ccc.py
      ansible.builtin.command:
        argv:
          - python3
          - "{{ playbook_dir }}/../bin/ccc.py"
          - token
          - "{{ ccc_base }}/auth/realms/elisity/protocol/openid-connect/token"
          - "{{ ccc_client_id }}"
          - "-"      # read secret from stdin
        stdin: "{{ ccc_client_secret }}"
      register: token_resp
      changed_when: false
      failed_when: false   # we'll handle failure in next task with full diagnostics

    - name: Show diagnostics if token acquisition failed
      ansible.builtin.fail:
        msg: |
          bin/ccc.py token returned rc={{ token_resp.rc }}.

          stderr (last 50 lines):
          {{ token_resp.stderr | default('(empty)') | regex_replace('^', '  ') }}

          Manual debug:
            python3 {{ playbook_dir }}/../bin/ccc.py token \
              {{ ccc_base }}/auth/realms/elisity/protocol/openid-connect/token \
              {{ ccc_client_id }} - <<< "{{ ccc_client_secret }}"
      when: token_resp.rc != 0

    - name: Cache token at /tmp/.ccc_token
      ansible.builtin.copy:
        content: "{{ token_resp.stdout | trim }}"
        dest: /tmp/.ccc_token
        mode: "0600"
      no_log: true

    - name: "[auth] Authenticated to {{ ccc_url }}"
      ansible.builtin.debug:
        msg: "Token acquired ({{ (token_resp.stdout | trim | length) }} chars), cached at /tmp/.ccc_token"
