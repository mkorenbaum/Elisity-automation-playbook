---
# Acquires an OAuth2 client_credentials token from CCC.
# Caches the bare token at /tmp/.ccc_token for downstream plays.
#
# Implementation note: we deliberately use curl via the command module
# instead of ansible.builtin.uri. The uri module's response handling
# (.json, .content) varies enough across Ansible builds — and especially
# between macOS and Linux — that we hit silent empty-content responses.
# curl is on every modern Mac and behaves identically across systems,
# and it makes the demo more transparent: the analyst literally sees a
# REST API call happen against CCC.

- name: "[auth] OAuth client_credentials → access token"
  hosts: local
  gather_facts: false
  vars_files:
    - ../creds.yml
  tasks:
    - name: Verify curl is available
      ansible.builtin.command: curl --version
      register: curl_check
      changed_when: false
      failed_when: curl_check.rc != 0

    - name: Acquire access token via curl
      ansible.builtin.command:
        argv:
          - curl
          - --silent
          - --show-error
          - --fail
          - "{{ '--insecure' if not ccc_validate_certs else '--verbose' }}"
          - --request
          - POST
          - --data-urlencode
          - grant_type=client_credentials
          - --data-urlencode
          - "client_id={{ ccc_client_id }}"
          - --data-urlencode
          - "client_secret={{ ccc_client_secret }}"
          - --data-urlencode
          - scope=openid
          - "{{ ccc_url }}/auth/realms/elisity/protocol/openid-connect/token"
      register: token_resp
      no_log: true
      changed_when: false

    - name: Cache bare token at /tmp/.ccc_token
      ansible.builtin.copy:
        content: "{{ (token_resp.stdout | from_json).access_token }}"
        dest: /tmp/.ccc_token
        mode: "0600"
      no_log: true

    - name: "[auth] Authenticated to {{ ccc_url }}"
      ansible.builtin.debug:
        msg:
          - "Token acquired (expires in {{ (token_resp.stdout | from_json).expires_in }}s)"
          - "Cached at /tmp/.ccc_token"
