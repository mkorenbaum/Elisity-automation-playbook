---
# Acquires an OAuth2 client_credentials token from CCC.
# Caches the bare token at /tmp/.ccc_token for downstream plays.
#
# Implementation: every CCC API interaction is delegated to bin/ccc.py,
# a 100-line Python 3 stdlib helper. We hit two reliability problems
# trying to do the HTTP from Ansible directly: the `uri` module's
# response decoding varies across builds (especially on macOS Ansible
# 2.20.5 returning empty content), and `curl --silent` via the `command`
# module produced empty stdout the same way. The Python script uses
# urllib + json + ssl with explicit decoding — identical behavior on
# macOS, Linux, anything with python3.

- name: "[auth] OAuth client_credentials → access token"
  hosts: local
  gather_facts: false
  vars_files:
    - ../creds.yml
  tasks:
    - name: Verify python3 is available
      ansible.builtin.command: python3 --version
      register: py_check
      changed_when: false
      failed_when: py_check.rc != 0

    - name: Acquire access token via bin/ccc.py
      ansible.builtin.command:
        argv:
          - python3
          - "{{ playbook_dir }}/../bin/ccc.py"
          - token
          - "{{ ccc_url }}/auth/realms/elisity/protocol/openid-connect/token"
          - "{{ ccc_client_id }}"
          - "{{ ccc_client_secret }}"
      register: token_resp
      no_log: true
      changed_when: false

    - name: Cache token at /tmp/.ccc_token
      ansible.builtin.copy:
        content: "{{ token_resp.stdout | trim }}"
        dest: /tmp/.ccc_token
        mode: "0600"
      no_log: true

    - name: "[auth] Authenticated to {{ ccc_url }}"
      ansible.builtin.debug:
        msg: "Token acquired ({{ (token_resp.stdout | trim | length) }} chars), cached at /tmp/.ccc_token"
