# GitLab CI mirror of the GitHub Actions workflows.
#
# Same three triggers, same three Makefile targets, same outputs:
#   - merge_request   → preview (read-only, comments on the MR)
#   - push to main    → apply (creates in MONITOR_ONLY)
#   - tag vX.Y.Z      → promote (MONITOR_AND_ENFORCE)
#
# The `make ci-*` targets are the contract. Whichever pipeline tool
# your team uses, you call the same three commands.

image: python:3.12-slim

variables:
  PYTHONUNBUFFERED: "1"

before_script:
  - apt-get update -qq && apt-get install -qq -y make git
  - pip install --quiet ansible PyYAML
  - make ci-creds

stages: [preview, apply, promote]

# ─────────────────────────────────────────────────────────────────────
preview:
  stage: preview
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  script:
    - make ci-preview > preview.md
    # Post or update a single MR comment via the GitLab API
    - |
      curl -sk --request POST \
        --header "PRIVATE-TOKEN: $GITLAB_BOT_TOKEN" \
        --header "Content-Type: application/json" \
        --data "{\"body\": $(python3 -c 'import json,sys; print(json.dumps(open("preview.md").read()))')}" \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/merge_requests/$CI_MERGE_REQUEST_IID/notes"
  artifacts:
    paths: [preview.md]

# ─────────────────────────────────────────────────────────────────────
apply:
  stage: apply
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  resource_group: ccc-apply       # serialize against promote
  script:
    - make ci-apply 2>&1 | tee apply.log
  artifacts:
    paths: [apply.log]

# ─────────────────────────────────────────────────────────────────────
promote:
  stage: promote
  rules:
    - if: '$CI_COMMIT_TAG'
  resource_group: ccc-apply
  script:
    - make ci-promote
