---
# Shared facts for all plays.
#
# These IDs are tenant-specific and were captured from insights-demo.
# If you re-target a different CCC tenant, run `make bootstrap` to
# refresh them.

# ── v2 policy set (created by bootstrap) ─────────────────────────
# After running bootstrap.yml, update these with the resolved IDs
# printed by bootstrap.py.
ccc_policy_set_name: "FRSTR-HOSPITAL"
ccc_policy_set_id:   "87bfab28-0f4d-4039-85ed-97deadb88d4b"                        # set after bootstrap

# PG label created by bootstrap — scopes which PGs participate in
# the demo policy set.
ccc_pg_label_name: "FORRESTER-DEMO"
ccc_pg_label_id:   "bf918bc4-0fd5-4abf-b473-f6b77e3f70be"                          # set after bootstrap

# ── legacy IDs (still used by promote.py) ────────────────────────
# Built-in "Allow All" Security Profile — used as the fallback in
# promote.py for the finalAction field.
ccc_security_profile_id:   "97e9e16d-8a9d-41a1-9b3b-5fb92165b08e"
ccc_security_profile_name: "Allow All"

# ── urllib defaults ──────────────────────────────────────────────
ccc_validate_certs: false

# Normalized base URL (strips trailing slashes from ccc_url).
ccc_base: "{{ ccc_url | regex_replace('/+$', '') }}"
